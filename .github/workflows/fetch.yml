name: Fetch Leaderboards

on:
  schedule:
    - cron: '13 5 * * *'  # 05:13 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch leaderboards
        run: python3 scripts/fetch_leaderboards.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          DATE=$(python3 -c "from datetime import datetime, timezone; print(datetime.now(timezone.utc).strftime('%Y-%m-%d'))")
          git diff --cached --quiet || git commit -m "data: ${DATE} daily fetch"
          git push
